<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Base64 Encoder / Decoder</title>
  <meta
    name="description"
    content="Encode or decode Base64 text instantly. Free online Base64 encoder and decoder tool."
  />
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #222222;
      --muted: #555555;
      --border: #e7e7e7;
      --shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      --blue: #0d6efd;
      --blue-hover: #0b5ed7;
      --yellow: #ffd400;
      --yellow-hover: #f2c900;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 24px 16px 40px;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: var(--blue);
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .tool-box {
      background: var(--card);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 28px;
      border: 1px solid rgba(0, 0, 0, 0.03);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.2;
      color: var(--text);
    }

    .intro {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 16px;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    textarea {
      width: 100%;
      min-height: 180px;
      padding: 14px 16px;
      font-size: 16px;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: #fafafa;
      border: 1px solid #d9d9d9;
      border-radius: 12px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    textarea:focus {
      border-color: var(--blue);
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.12);
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .primary-btn {
      border: none;
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease, box-shadow 0.2s ease;
      background: var(--blue);
      color: #ffffff;
      box-shadow: 0 2px 8px rgba(13, 110, 253, 0.18);
    }

    .primary-btn:hover {
      background: var(--blue-hover);
      transform: translateY(-1px);
    }

    .result-wrap {
      margin-top: 22px;
    }

    .result {
      min-height: 120px;
      background: #f8f9fb;
      border: 1px solid #dfe3ea;
      border-radius: 12px;
      padding: 16px;
      color: var(--text);
      word-break: break-word;
      white-space: pre-wrap;
    }

    .copy-row {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .copy-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease;
      background: #111111;
      color: #ffffff;
    }

    .copy-btn:hover {
      background: #333333;
      transform: translateY(-1px);
    }

    .status {
      font-size: 14px;
      color: #2f6f44;
      min-height: 20px;
    }

    .small {
      font-size: 14px;
      color: #666666;
      margin: 18px 0 0;
    }

    .support-wrap {
      text-align: center;
      margin-top: 26px;
    }

    .coffee-btn {
      display: inline-block;
      background: var(--yellow);
      color: #111111;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      padding: 12px 22px;
      border-radius: 10px;
      transition: background 0.2s ease, transform 0.15s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .coffee-btn:hover {
      background: var(--yellow-hover);
      transform: translateY(-1px);
    }

    @media (max-width: 640px) {
      body {
        padding: 18px 12px 32px;
      }

      .tool-box {
        padding: 20px;
        border-radius: 16px;
      }

      h1 {
        font-size: 27px;
      }

      .buttons {
        grid-template-columns: 1fr;
      }

      .primary-btn,
      .copy-btn,
      .coffee-btn {
        width: 100%;
      }

      .support-wrap {
        text-align: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <a class="back-link" href="../">⬅ Back to tools</a>

    <div class="tool-box">
      <h1>Base64 Encoder / Decoder</h1>
      <p class="intro">
        Encode text to Base64 or decode Base64 back to readable text.
      </p>

      <label class="label" for="input">Input</label>
      <textarea id="input" placeholder="Enter text or Base64 here..."></textarea>

      <div class="buttons">
        <button class="primary-btn" onclick="encodeText()">Encode to Base64</button>
        <button class="primary-btn" onclick="decodeText()">Decode Base64</button>
      </div>

      <div class="result-wrap">
        <label class="label" for="result">Result</label>
        <div class="result" id="result"></div>
      </div>

      <div class="copy-row">
        <button class="copy-btn" onclick="copyResult()">Copy Result</button>
        <span class="status" id="status"></span>
      </div>

      <p class="small">
        Base64 is commonly used in web development, APIs and data encoding.
      </p>

      <div class="support-wrap">
        <a
          class="coffee-btn"
          href="https://www.buymeacoffee.com/"
          target="_blank"
          rel="noopener noreferrer"
        >
          Support me on Buy Me a Coffee
        </a>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById("input");
    const result = document.getElementById("result");
    const status = document.getElementById("status");

    function setStatus(message, isError = false) {
      status.textContent = message;
      status.style.color = isError ? "#b42318" : "#2f6f44";
    }

    function encodeText() {
      const text = input.value;
      status.textContent = "";

      try {
        const encoded = btoa(unescape(encodeURIComponent(text)));
        result.textContent = encoded;
        setStatus("Text encoded successfully.");
      } catch (error) {
        result.textContent = "";
        setStatus("Unable to encode text.", true);
      }
    }

    function decodeText() {
      const text = input.value.trim();
      status.textContent = "";

      try {
        const decoded = decodeURIComponent(escape(atob(text)));
        result.textContent = decoded;
        setStatus("Base64 decoded successfully.");
      } catch (error) {
        result.textContent = "";
        setStatus("Invalid Base64 input.", true);
      }
    }

    function copyResult() {
      const text = result.textContent.trim();

      if (!text) {
        setStatus("Nothing to copy.", true);
        return;
      }

      navigator.clipboard.writeText(text)
        .then(() => {
          setStatus("Result copied to clipboard.");
        })
        .catch(() => {
          setStatus("Copy failed.", true);
        });
    }
  </script>
</body>
</html>
