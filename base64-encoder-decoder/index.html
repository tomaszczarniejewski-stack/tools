<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 Encoder / Decoder</title>
<meta name="description" content="Encode or decode Base64 text instantly. Free online Base64 encoder and decoder tool.">
<style>
*{box-sizing:border-box}
body{
font-family:Arial,sans-serif;
max-width:900px;
margin:0 auto;
padding:24px;
background:#f7f7f7;
color:#222
}
.box{
background:#fff;
padding:24px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08)
}
h1{margin-top:0;font-size:32px}
p{color:#444}
textarea{
width:100%;
min-height:160px;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
resize:vertical
}
.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:16px
}
button{
padding:12px;
font-size:16px;
background:#111;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer
}
button:hover{background:#333}
.result{
margin-top:24px;
background:#f1f5f9;
border:1px solid #dbe2ea;
border-radius:8px;
padding:16px;
word-break:break-word
}
.copy-btn{
margin-top:12px;
background:#2563eb
}
.copy-btn:hover{background:#1d4ed8}
a{
color:#2563eb;
text-decoration:none
}
a:hover{text-decoration:underline}
.small{
font-size:14px;
color:#666;
margin-top:10px
}
</style>
</head>
<body>

<div class="box">

<p><a href="../">⬅ Back to tools</a></p>

<h1>Base64 Encoder / Decoder</h1>
<p>Encode text to Base64 or decode Base64 back to readable text.</p>

<textarea id="input" placeholder="Enter text or Base64 here..."></textarea>

<div class="buttons">
<button onclick="encode()">Encode to Base64</button>
<button onclick="decode()">Decode Base64</button>
</div>

<div class="result" id="result"></div>

<button class="copy-btn" onclick="copyResult()">Copy Result</button>

<p class="small">Base64 is commonly used in web development, APIs and data encoding.</p>

</div>

<script>

function encode(){
let text=document.getElementById("input").value
try{
let encoded=btoa(unescape(encodeURIComponent(text)))
document.getElementById("result").textContent=encoded
}catch{
alert("Unable to encode text")
}
}

function decode(){
let text=document.getElementById("input").value
try{
let decoded=decodeURIComponent(escape(atob(text)))
document.getElementById("result").textContent=decoded
}catch{
alert("Invalid Base64 input")
}
}

function copyResult(){
let text=document.getElementById("result").textContent
if(!text){
alert("Nothing to copy")
return
}
navigator.clipboard.writeText(text).then(()=>alert("Copied"))
}

</script>

</body>
</html>
