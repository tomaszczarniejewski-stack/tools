<!DOCTYPE html>
<html>

<head>
<title>Calorie Calculator</title>
</head>

<body>

<h1>Daily Calorie Calculator</h1>

<p>Weight (kg):</p>
<input id="weight">

<p>Height (cm):</p>
<input id="height">

<p>Age:</p>
<input id="age">

<br><br>

<button onclick="calculate()">Calculate</button>

<p id="result"></p>

<script>

function calculate(){

let weight = document.getElementById("weight").value;
let height = document.getElementById("height").value;
let age = document.getElementById("age").value;

let calories = 10*weight + 6.25*height - 5*age + 5;

document.getElementById("result").innerText = "Estimated calories per day: " + Math.round(calories);

}

</script>

</body>

</html>
