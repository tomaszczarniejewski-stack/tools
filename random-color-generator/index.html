<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Color Generator</title>
<meta name="description" content="Generate random HEX colors for design, websites and graphics.">
<style>
*{box-sizing:border-box}
body{
font-family:Arial,sans-serif;
max-width:900px;
margin:0 auto;
padding:24px;
background:#f7f7f7;
color:#222
}
.box{
background:#fff;
padding:24px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08)
}
h1{margin-top:0;font-size:32px}
p{color:#444}
.preview{
margin-top:20px;
height:180px;
border-radius:10px;
border:1px solid #dbe2ea;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
font-weight:bold;
color:#000
}
button{
margin-top:16px;
padding:12px;
width:100%;
font-size:16px;
background:#111;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer
}
button:hover{background:#333}
.copy-btn{
background:#2563eb
}
.copy-btn:hover{background:#1d4ed8}
.history{
margin-top:20px;
font-family:monospace;
font-size:14px;
word-break:break-word;
color:#444
}
a{
color:#2563eb;
text-decoration:none
}
a:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="box">

<p><a href="../">⬅ Back to tools</a></p>

<h1>Random Color Generator</h1>
<p>Generate random HEX colors for websites, graphics and design.</p>

<div class="preview" id="preview">#FFFFFF</div>

<button onclick="generate()">Generate Color</button>
<button class="copy-btn" onclick="copyColor()">Copy HEX</button>

<div class="history" id="history"></div>

</div>

<script>

let historyColors=[]

function randomHex(){
let letters="0123456789ABCDEF"
let color="#"
for(let i=0;i<6;i++){
color+=letters[Math.floor(Math.random()*16)]
}
return color
}

function generate(){

let color=randomHex()

let preview=document.getElementById("preview")

preview.style.background=color
preview.textContent=color

historyColors.unshift(color)

if(historyColors.length>20){
historyColors.pop()
}

document.getElementById("history").textContent="History: "+historyColors.join(", ")

}

function copyColor(){

let color=document.getElementById("preview").textContent

navigator.clipboard.writeText(color).then(()=>alert("Copied"))

}

</script>

</body>
</html>
