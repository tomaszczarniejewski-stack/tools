<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story Title Generator</title>
  <meta name="description" content="Generate creative story title ideas for books, games, scripts, and writing prompts." />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px 16px;
      background: #f5f5f5;
      color: #222;
      font-family: Arial, sans-serif;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
    }

    .tool-box {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      padding: 28px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: #0d6efd;
      text-decoration: none;
      font-size: 15px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.15;
      color: #111;
    }

    .description {
      margin: 0 0 24px;
      color: #555;
      font-size: 16px;
      line-height: 1.6;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }

    .field {
      margin-bottom: 18px;
    }

    .full-width {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #222;
    }

    input,
    select,
    button {
      width: 100%;
      font-family: Arial, sans-serif;
      font-size: 16px;
      border-radius: 12px;
    }

    input,
    select {
      border: 1px solid #d7d7d7;
      padding: 13px 14px;
      background: #fff;
      color: #222;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #999;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .btn {
      border: none;
      cursor: pointer;
      padding: 13px 18px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: #111;
      color: #fff;
      flex: 1 1 220px;
    }

    .btn-primary:hover {
      background: #222;
    }

    .btn-secondary {
      background: #ececec;
      color: #111;
      flex: 1 1 160px;
    }

    .btn-secondary:hover {
      background: #e2e2e2;
    }

    .results,
    .history {
      display: none;
      margin-top: 26px;
      padding: 20px;
      border-radius: 16px;
      background: #f8f9fb;
      border: 1px solid #e6e6e6;
    }

    .results h2,
    .history h3 {
      margin: 0 0 16px;
      color: #111;
    }

    .title-list,
    .history-list {
      display: grid;
      gap: 14px;
    }

    .title-card,
    .history-item {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 14px;
      padding: 16px;
    }

    .title-label,
    .history-label {
      font-size: 14px;
      font-weight: bold;
      color: #555;
      margin-bottom: 8px;
    }

    .title-value,
    .history-value {
      background: #f4f6f8;
      border: 1px solid #dde2e7;
      border-radius: 10px;
      padding: 12px;
      font-size: 22px;
      font-weight: bold;
      line-height: 1.35;
      color: #111;
      word-break: break-word;
    }

    .copy-btn {
      margin-top: 10px;
      background: #0d6efd;
      color: #fff;
    }

    .copy-btn:hover {
      background: #0b5ed7;
    }

    .tip-text {
      margin-top: 16px;
      font-size: 14px;
      color: #666;
      line-height: 1.55;
    }

    .message {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
    }

    .message.success {
      background: #eef7ee;
      color: #1f7a1f;
      border: 1px solid #cce7cc;
    }

    .coffee-wrap {
      margin-top: 28px;
    }

    .coffee-btn {
      display: inline-block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      background: #ffd400;
      color: #111;
      font-weight: bold;
      padding: 14px 18px;
      border-radius: 12px;
      transition: 0.2s ease;
    }

    .coffee-btn:hover {
      filter: brightness(0.97);
      transform: translateY(-1px);
    }

    @media (max-width: 700px) {
      .controls-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 16px 12px;
      }

      .tool-box {
        padding: 20px;
      }

      h1 {
        font-size: 28px;
      }

      .button-row {
        flex-direction: column;
      }

      .title-value,
      .history-value {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="tool-box">
      <a class="back-link" href="../">⬅ Back to tools</a>

      <h1>Story Title Generator</h1>
      <p class="description">Generate creative story title ideas for books, games, scripts, and writing prompts.</p>

      <div class="controls-grid">
        <div class="field">
          <label for="style">Title style</label>
          <select id="style">
            <option value="general">General</option>
            <option value="fantasy">Fantasy</option>
            <option value="scifi">Sci-Fi</option>
            <option value="horror">Horror</option>
            <option value="mystery">Mystery</option>
          </select>
        </div>

        <div class="field">
          <label for="count">Number of titles</label>
          <select id="count">
            <option value="1">1 title</option>
            <option value="3" selected>3 titles</option>
            <option value="5">5 titles</option>
          </select>
        </div>

        <div class="field full-width">
          <label for="keyword">Optional keyword</label>
          <input id="keyword" type="text" placeholder="e.g. dragon, mars, king, shadow" />
        </div>
      </div>

      <div class="button-row">
        <button class="btn btn-primary" onclick="generateTitles()">Generate Title</button>
        <button class="btn btn-primary" onclick="generateTitles()">Generate Again</button>
        <button class="btn btn-secondary" onclick="clearResults()">Clear</button>
      </div>

      <div class="message success" id="successMessage"></div>

      <div class="results" id="results">
        <h2>Generated Titles</h2>
        <div class="title-list" id="titleList"></div>
        <p class="tip-text">Tip: strong titles usually combine mystery, emotion, or contrast.</p>
      </div>

      <div class="history" id="historySection">
        <h3>Recent History</h3>
        <div class="history-list" id="historyList"></div>
      </div>

      <div class="coffee-wrap">
        <a class="coffee-btn" href="https://buymeacoffee.com/" target="_blank" rel="noopener noreferrer">Buy Me a Coffee</a>
      </div>
    </div>
  </div>

  <script>
    const historyItems = [];

    const titleData = {
      general: {
        part1: ["The Secret of", "The Shadow of", "The Rise of", "The Fall of", "The Mystery of", "The Legend of", "The Curse of", "The Return of", "Echoes of", "Beyond", "The Last", "Whispers of"],
        part2: ["The Lost City", "The Hidden World", "The Last Kingdom", "The Dark Forest", "The Forgotten Empire", "The Silent Planet", "The Broken Crown", "The Golden Gate", "The Final Horizon", "The Empty Throne"]
      },
      fantasy: {
        part1: ["The Crown of", "The Sword of", "The Spell of", "The Dragon of", "The Heir of", "The Curse of", "The Throne of", "The Song of", "Whispers of", "The Fall of"],
        part2: ["The Ancient Realm", "The Black Tower", "The Forgotten King", "The Crystal Forest", "The Burning Moon", "The Silver Queen", "The Lost Heir", "The Broken Kingdom", "The Golden Blade", "The Final Prophecy"]
      },
      scifi: {
        part1: ["The Signal of", "The Last Voyage to", "The Shadow over", "Echoes from", "Return to", "The Code of", "The Fall of", "The Rise of", "Beyond", "The Memory of"],
        part2: ["Mars", "The Silent Station", "The Neon Planet", "The Final Colony", "The Broken System", "The Dark Nebula", "The Lost Signal", "The Iron Moon", "The Dead Orbit", "The Quantum Gate"]
      },
      horror: {
        part1: ["The House of", "The Shadow of", "The Curse of", "The Silence of", "The Night of", "The Return of", "The Grave of", "The Whispering", "The Fear of", "The Last"],
        part2: ["The Hollow Man", "The Dark Hallway", "The Dead Child", "The Empty Church", "The Black Woods", "The Frozen Grave", "The Red Room", "The Broken Mirror", "The Silent House", "The Hidden Door"]
      },
      mystery: {
        part1: ["The Mystery of", "The Secret of", "The Case of", "The Death of", "The Return of", "The Silence of", "The Last Letter of", "The Shadow of", "The Missing", "The Witness to"],
        part2: ["The Seventh Guest", "The Locked Room", "The Hidden Key", "The Old Mansion", "The Final Clue", "The Missing Heir", "The Forgotten Witness", "The Dead Collector", "The Private Archive", "The Midnight Train"]
      }
    };

    function randomItem(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function showSuccess(text) {
      const box = document.getElementById("successMessage");
      box.textContent = text;
      box.style.display = "block";

      setTimeout(() => {
        box.style.display = "none";
        box.textContent = "";
      }, 1800);
    }

    function normalizeKeyword(text) {
      return text.trim().replace(/\s+/g, " ");
    }

    function capitalizeWords(text) {
      return text
        .split(" ")
        .filter(Boolean)
        .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
        .join(" ");
    }

    function buildTitle(style, keyword) {
      const data = titleData[style];
      const a = randomItem(data.part1);
      const b = randomItem(data.part2);
      const cleanKeyword = keyword ? capitalizeWords(normalizeKeyword(keyword)) : "";

      const patterns = [
        a + " " + (cleanKeyword || b),
        "Echoes of " + (cleanKeyword || b),
        "Beyond " + (cleanKeyword || b),
        "Return to " + (cleanKeyword || b),
        (cleanKeyword || b) + " Rising",
        "The " + (cleanKeyword || randomItem(["Silent", "Broken", "Lost", "Hidden", "Golden"])) + " " + randomItem(["Legacy", "Empire", "Crown", "Gate", "Signal", "Forest"]),
        "Whispers of " + (cleanKeyword || b)
      ];

      let result = randomItem(patterns)
        .replace(/\s+/g, " ")
        .trim();

      if (!cleanKeyword && result.includes("The The ")) {
        result = result.replace("The The ", "The ");
      }

      return result;
    }

    function generateUniqueTitles(style, count, keyword) {
      const unique = new Set();
      let safety = 0;

      while (unique.size < count && safety < 200) {
        unique.add(buildTitle(style, keyword));
        safety++;
      }

      return Array.from(unique);
    }

    function generateTitles() {
      const style = document.getElementById("style").value;
      const count = Number(document.getElementById("count").value);
      const keyword = document.getElementById("keyword").value.trim();
      const titles = generateUniqueTitles(style, count, keyword);

      const titleList = document.getElementById("titleList");
      const results = document.getElementById("results");

      titleList.innerHTML = titles.map((title, index) => `
        <div class="title-card">
          <div class="title-label">Title #${index + 1}</div>
          <div class="title-value" id="title-${index}">${escapeHtml(title)}</div>
          <button class="btn copy-btn" onclick="copyText('title-${index}', this)">Copy</button>
        </div>
      `).join("");

      results.style.display = "block";

      titles.forEach(title => addToHistory(title));
    }

    function copyText(id, button) {
      const text = document.getElementById(id).textContent;
      const originalText = button.textContent;

      navigator.clipboard.writeText(text).then(() => {
        button.textContent = "Copied!";
        showSuccess("Title copied to clipboard.");

        setTimeout(() => {
          button.textContent = originalText;
        }, 1200);
      }).catch(() => {
        showSuccess("Copy failed. Please try again.");
      });
    }

    function addToHistory(title) {
      historyItems.unshift(title);

      if (historyItems.length > 8) {
        historyItems.pop();
      }

      renderHistory();
    }

    function renderHistory() {
      const historySection = document.getElementById("historySection");
      const historyList = document.getElementById("historyList");

      if (!historyItems.length) {
        historySection.style.display = "none";
        historyList.innerHTML = "";
        return;
      }

      historyList.innerHTML = historyItems.map((title, index) => `
        <div class="history-item">
          <div class="history-label">Recent Title #${historyItems.length - index}</div>
          <div class="history-value">${escapeHtml(title)}</div>
          <button class="btn copy-btn" onclick="copyHistory(${index}, this)">Copy</button>
        </div>
      `).join("");

      historySection.style.display = "block";
    }

    function copyHistory(index, button) {
      const text = historyItems[index];
      const originalText = button.textContent;

      navigator.clipboard.writeText(text).then(() => {
        button.textContent = "Copied!";
        showSuccess("History title copied.");

        setTimeout(() => {
          button.textContent = originalText;
        }, 1200);
      }).catch(() => {
        showSuccess("Copy failed. Please try again.");
      });
    }

    function clearResults() {
      document.getElementById("results").style.display = "none";
      document.getElementById("titleList").innerHTML = "";
      document.getElementById("keyword").value = "";
      historyItems.length = 0;
      renderHistory();
      document.getElementById("successMessage").style.display = "none";
      document.getElementById("successMessage").textContent = "";
    }
  </script>
</body>
</html>
