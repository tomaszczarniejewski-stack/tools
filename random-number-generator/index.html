<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Number Generator</title>
<meta name="description" content="Generate random numbers between a minimum and maximum value instantly.">
<style>
*{box-sizing:border-box}
body{
font-family:Arial,sans-serif;
max-width:900px;
margin:0 auto;
padding:24px;
background:#f7f7f7;
color:#222
}
.box{
background:#fff;
padding:24px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08)
}
h1{margin-top:0;font-size:32px}
p{color:#444}
.controls{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:16px
}
input,button{
width:100%;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px
}
button{
margin-top:16px;
background:#111;
color:#fff;
border:none;
cursor:pointer
}
button:hover{background:#333}
.result{
margin-top:24px;
font-size:40px;
font-weight:bold;
text-align:center;
background:#f1f5f9;
border:1px solid #dbe2ea;
border-radius:10px;
padding:20px
}
.history{
margin-top:20px;
font-family:monospace;
font-size:14px;
color:#444;
word-break:break-word
}
a{
color:#2563eb;
text-decoration:none
}
a:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="box">

<p><a href="../">⬅ Back to tools</a></p>

<h1>Random Number Generator</h1>
<p>Generate random numbers between a minimum and maximum value.</p>

<div class="controls">

<input id="min" type="number" value="1">
<input id="max" type="number" value="100">

</div>

<button onclick="generate()">Generate Random Number</button>

<div class="result" id="result">-</div>

<div class="history" id="history"></div>

</div>

<script>

let historyList=[]

function generate(){

let min=parseInt(document.getElementById("min").value)
let max=parseInt(document.getElementById("max").value)

if(isNaN(min)||isNaN(max)){
alert("Enter valid numbers")
return
}

if(min>max){
alert("Minimum cannot be greater than maximum")
return
}

let number=Math.floor(Math.random()*(max-min+1))+min

document.getElementById("result").textContent=number

historyList.unshift(number)

if(historyList.length>20){
historyList.pop()
}

document.getElementById("history").textContent="History: "+historyList.join(", ")

}

</script>

</body>
</html>
