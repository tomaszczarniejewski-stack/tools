<!DOCTYPE html>
<html>

<head>
<title>Business Name Generator</title>
</head>

<body>

<p><a href="../">⬅ Back to tools</a></p>

<h1>Business Name Generator</h1>

<button onclick="generate()">Generate Business Name</button>

<p id="name"></p>

<script>

const first = ["Nova","Bright","Future","Prime","Next","Ultra","Smart","Blue","Green","Golden"];
const second = ["Labs","Solutions","Studio","Works","Systems","Tech","Group","Company","Factory","Hub"];

function generate(){
const a = first[Math.floor(Math.random()*first.length)];
const b = second[Math.floor(Math.random()*second.length)];

document.getElementById("name").innerText = a + " " + b;
}

</script>

</body>
</html>
