<!DOCTYPE html>
<html>

<head>
<title>Random Word Generator</title>
</head>

<body>

<p><a href="../">⬅ Back to tools</a></p>

<h1>Random Word Generator</h1>

<button onclick="generate()">Generate Word</button>

<p id="word"></p>

<script>

const words = [
"future","power","dream","success","focus",
"growth","energy","vision","create","build",
"momentum","clarity","innovation","progress","freedom"
];

function generate(){
const w = words[Math.floor(Math.random()*words.length)];
document.getElementById("word").innerText = w;
}

</script>

</body>
</html>
