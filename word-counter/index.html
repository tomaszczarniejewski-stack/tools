<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter</title>
<meta name="description" content="Count words, characters, sentences and paragraphs in your text. Simple free word counter tool.">
<style>
*{box-sizing:border-box}
body{
font-family:Arial,sans-serif;
max-width:900px;
margin:0 auto;
padding:24px;
background:#f7f7f7;
color:#222
}
.box{
background:#fff;
padding:24px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08)
}
h1{margin-top:0;font-size:32px}
p{color:#444}
textarea{
width:100%;
min-height:200px;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
resize:vertical
}
.stats{
margin-top:24px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px
}
.stat{
background:#f1f5f9;
border:1px solid #dbe2ea;
border-radius:8px;
padding:16px;
font-size:18px
}
button{
margin-top:18px;
padding:12px;
width:100%;
font-size:16px;
background:#111;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer
}
button:hover{background:#333}
a{
color:#2563eb;
text-decoration:none
}
a:hover{text-decoration:underline}
.small{
font-size:14px;
color:#666;
margin-top:10px
}
</style>
</head>
<body>

<div class="box">

<p><a href="../">⬅ Back to tools</a></p>

<h1>Word Counter</h1>
<p>Count words, characters, sentences and paragraphs in your text.</p>

<textarea id="text" placeholder="Paste or type your text here..."></textarea>

<button onclick="analyze()">Count Words</button>

<div class="stats">

<div class="stat">Words: <span id="words">0</span></div>
<div class="stat">Characters: <span id="chars">0</span></div>
<div class="stat">Characters (no spaces): <span id="charsNo">0</span></div>
<div class="stat">Sentences: <span id="sentences">0</span></div>
<div class="stat">Paragraphs: <span id="paragraphs">0</span></div>
<div class="stat">Reading time: <span id="reading">0</span> min</div>

</div>

<p class="small">Average reading speed used: 200 words per minute.</p>

</div>

<script>

function analyze(){

let text=document.getElementById("text").value

let words=text.trim().match(/\b\S+\b/g)
let wordCount=words?words.length:0

let charCount=text.length

let charNoSpace=text.replace(/\s/g,"").length

let sentences=text.split(/[.!?]+/).filter(s=>s.trim().length>0).length

let paragraphs=text.split(/\n+/).filter(p=>p.trim().length>0).length

let reading=Math.ceil(wordCount/200)

document.getElementById("words").textContent=wordCount
document.getElementById("chars").textContent=charCount
document.getElementById("charsNo").textContent=charNoSpace
document.getElementById("sentences").textContent=sentences
document.getElementById("paragraphs").textContent=paragraphs
document.getElementById("reading").textContent=reading

}

</script>

</body>
</html>
