<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Name Picker</title>
<meta name="description" content="Pick a random name from a list. Useful for giveaways, classrooms, raffles, and random selection.">
<style>
*{box-sizing:border-box}
body{
font-family:Arial,sans-serif;
max-width:900px;
margin:0 auto;
padding:24px;
background:#f7f7f7;
color:#222
}
.box{
background:#fff;
padding:24px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08)
}
h1{margin-top:0;font-size:32px}
p{color:#444}
textarea{
width:100%;
min-height:160px;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
resize:vertical
}
button{
margin-top:16px;
padding:12px;
width:100%;
font-size:16px;
background:#111;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer
}
button:hover{background:#333}
.result{
margin-top:24px;
font-size:28px;
font-weight:bold;
text-align:center;
background:#f1f5f9;
border:1px solid #dbe2ea;
border-radius:10px;
padding:20px
}
.small{
margin-top:10px;
font-size:14px;
color:#666
}
a{
color:#2563eb;
text-decoration:none
}
a:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="box">

<p><a href="../">⬅ Back to tools</a></p>

<h1>Random Name Picker</h1>
<p>Paste a list of names and randomly pick one.</p>

<textarea id="names" placeholder="Enter one name per line&#10;Example:&#10;John&#10;Anna&#10;Mike"></textarea>

<button onclick="pickName()">Pick Random Name</button>

<div class="result" id="result">-</div>

<p class="small">Tip: each line should contain one name.</p>

</div>

<script>

function pickName(){

let input=document.getElementById("names").value

let list=input
.split("\n")
.map(n=>n.trim())
.filter(n=>n.length>0)

if(list.length===0){
alert("Enter at least one name")
return
}

let randomIndex=Math.floor(Math.random()*list.length)

let name=list[randomIndex]

document.getElementById("result").textContent=name

}

</script>

</body>
</html>
