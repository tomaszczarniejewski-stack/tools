<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slug Generator</title>
  <meta name="description" content="Generate clean SEO-friendly URL slugs from titles, keywords, and phrases." />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 24px 16px;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
    }

    .tool-box {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      padding: 28px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: #0d6efd;
      text-decoration: none;
      font-size: 15px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.15;
      color: #111;
    }

    .description {
      margin: 0 0 24px;
      color: #555;
      font-size: 16px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #222;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      font-family: Arial, sans-serif;
      font-size: 16px;
      border-radius: 12px;
    }

    input,
    select,
    textarea {
      border: 1px solid #d7d7d7;
      padding: 13px 14px;
      background: #fff;
      color: #222;
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #999;
    }

    textarea {
      resize: vertical;
      min-height: 110px;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .btn {
      border: none;
      cursor: pointer;
      padding: 13px 18px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: #111;
      color: #fff;
    }

    .btn-primary:hover {
      background: #222;
    }

    .btn-secondary {
      background: #ececec;
      color: #111;
    }

    .btn-secondary:hover {
      background: #e2e2e2;
    }

    .results {
      display: none;
      margin-top: 26px;
      padding: 20px;
      border-radius: 16px;
      background: #f8f9fb;
      border: 1px solid #e6e6e6;
    }

    .results h2 {
      margin: 0 0 16px;
      font-size: 22px;
      color: #111;
    }

    .slug-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .slug-label {
      font-size: 14px;
      font-weight: bold;
      color: #555;
      margin-bottom: 8px;
    }

    .slug-value {
      background: #f4f6f8;
      border: 1px solid #dde2e7;
      border-radius: 10px;
      padding: 12px;
      font-family: monospace;
      font-size: 15px;
      word-break: break-word;
      color: #111;
    }

    .copy-btn {
      margin-top: 10px;
      background: #0d6efd;
      color: #fff;
    }

    .copy-btn:hover {
      background: #0b5ed7;
    }

    .preview-box {
      margin-top: 16px;
      background: #fff;
      border: 1px dashed #cfd6dd;
      border-radius: 12px;
      padding: 14px;
    }

    .preview-label {
      font-size: 14px;
      font-weight: bold;
      color: #555;
      margin-bottom: 6px;
    }

    .preview-url {
      word-break: break-word;
      font-family: monospace;
      color: #111;
    }

    .tip-text {
      margin-top: 16px;
      font-size: 14px;
      color: #666;
    }

    .message {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
    }

    .message.error {
      background: #fff1f1;
      color: #b42318;
      border: 1px solid #f1c0c0;
    }

    .message.success {
      background: #eef7ee;
      color: #1f7a1f;
      border: 1px solid #cce7cc;
    }

    .history {
      margin-top: 22px;
      display: none;
    }

    .history h3 {
      margin: 0 0 12px;
      font-size: 18px;
      color: #111;
    }

    .history-list {
      display: grid;
      gap: 10px;
    }

    .history-item {
      background: #fff;
      border: 1px solid #e3e3e3;
      border-radius: 12px;
      padding: 12px;
    }

    .history-title {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .history-slug {
      font-family: monospace;
      font-size: 14px;
      word-break: break-word;
      color: #111;
    }

    .coffee-wrap {
      margin-top: 28px;
    }

    .coffee-btn {
      display: inline-block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      background: #ffd400;
      color: #111;
      font-weight: bold;
      padding: 14px 18px;
      border-radius: 12px;
      transition: 0.2s ease;
    }

    .coffee-btn:hover {
      filter: brightness(0.97);
      transform: translateY(-1px);
    }

    @media (max-width: 640px) {
      body {
        padding: 16px 12px;
      }

      .tool-box {
        padding: 20px;
      }

      h1 {
        font-size: 28px;
      }

      .button-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="tool-box">
      <a class="back-link" href="../">⬅ Back to tools</a>

      <h1>Slug Generator</h1>
      <p class="description">Convert titles and phrases into clean SEO-friendly URL slugs.</p>

      <div class="field">
        <label for="text">Title, keyword, or phrase</label>
        <textarea id="text" placeholder="e.g. 15 Best Free AI Tools for Small Business in 2026"></textarea>
      </div>

      <div class="field">
        <label for="mode">Slug style</label>
        <select id="mode">
          <option value="default">Default</option>
          <option value="short">Short slug</option>
          <option value="keyword">Keyword-focused</option>
        </select>
      </div>

      <div class="field">
        <label for="removeWords">Optional words to remove</label>
        <input id="removeWords" type="text" placeholder="e.g. best, free, in, for" />
      </div>

      <div class="button-row">
        <button class="btn btn-primary" onclick="generateSlug()">Generate Slug</button>
        <button class="btn btn-secondary" onclick="clearForm()">Clear</button>
      </div>

      <div class="message error" id="errorMessage"></div>
      <div class="message success" id="successMessage"></div>

      <div class="results" id="result">
        <h2>Generated Slugs</h2>

        <div class="slug-card">
          <div class="slug-label">Slug #1</div>
          <div class="slug-value" id="slug1"></div>
          <button class="btn copy-btn" onclick="copyText('slug1', this)">Copy #1</button>
        </div>

        <div class="slug-card">
          <div class="slug-label">Slug #2</div>
          <div class="slug-value" id="slug2"></div>
          <button class="btn copy-btn" onclick="copyText('slug2', this)">Copy #2</button>
        </div>

        <div class="slug-card">
          <div class="slug-label">Slug #3</div>
          <div class="slug-value" id="slug3"></div>
          <button class="btn copy-btn" onclick="copyText('slug3', this)">Copy #3</button>
        </div>

        <div class="preview-box">
          <div class="preview-label">Full URL preview</div>
          <div class="preview-url" id="urlPreview">example.com/your-slug</div>
        </div>

        <p class="tip-text">Tip: shorter slugs usually work better for SEO and readability.</p>
      </div>

      <div class="history" id="historySection">
        <h3>Recent History</h3>
        <div class="history-list" id="historyList"></div>
      </div>

      <div class="coffee-wrap">
        <a class="coffee-btn" href="https://buymeacoffee.com/" target="_blank" rel="noopener noreferrer">Buy Me a Coffee</a>
      </div>
    </div>
  </div>

  <script>
    const historyItems = [];

    function showMessage(type, text) {
      const errorBox = document.getElementById("errorMessage");
      const successBox = document.getElementById("successMessage");

      errorBox.style.display = "none";
      successBox.style.display = "none";
      errorBox.textContent = "";
      successBox.textContent = "";

      if (type === "error") {
        errorBox.textContent = text;
        errorBox.style.display = "block";
      }

      if (type === "success") {
        successBox.textContent = text;
        successBox.style.display = "block";
        setTimeout(() => {
          successBox.style.display = "none";
          successBox.textContent = "";
        }, 1800);
      }
    }

    function normalizeText(text) {
      return text
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/&/g, " and ")
        .replace(/[^a-z0-9\s-]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function removeDuplicateWords(words) {
      const seen = new Set();
      return words.filter(word => {
        if (seen.has(word)) return false;
        seen.add(word);
        return true;
      });
    }

    function toSlug(text) {
      return text
        .trim()
        .replace(/\s+/g, "-")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "");
    }

    function addToHistory(originalText, chosenSlug) {
      historyItems.unshift({
        title: originalText,
        slug: chosenSlug
      });

      if (historyItems.length > 5) {
        historyItems.pop();
      }

      renderHistory();
    }

    function renderHistory() {
      const historySection = document.getElementById("historySection");
      const historyList = document.getElementById("historyList");

      if (!historyItems.length) {
        historySection.style.display = "none";
        historyList.innerHTML = "";
        return;
      }

      historySection.style.display = "block";
      historyList.innerHTML = historyItems.map(item => `
        <div class="history-item">
          <div class="history-title">${escapeHtml(item.title)}</div>
          <div class="history-slug">${escapeHtml(item.slug)}</div>
        </div>
      `).join("");
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function generateSlug() {
      const rawText = document.getElementById("text").value.trim();
      const mode = document.getElementById("mode").value;
      const removeWordsInput = document.getElementById("removeWords").value.trim();

      if (!rawText) {
        showMessage("error", "Please enter a title, keyword, or phrase.");
        document.getElementById("result").style.display = "none";
        return;
      }

      showMessage("", "");

      const stopWords = [
        "a", "an", "the", "of", "to", "and", "or", "but", "in", "on", "at",
        "for", "with", "by", "from", "is", "are", "was", "were", "be", "as"
      ];

      const customRemoveWords = removeWordsInput
        ? removeWordsInput
            .toLowerCase()
            .split(",")
            .map(word => word.trim())
            .filter(Boolean)
        : [];

      const text = normalizeText(rawText);
      let words = text.split(" ").filter(Boolean);

      const slugDefault = toSlug(words.join(" "));

      let shortWords = words.filter(word => !stopWords.includes(word) && !customRemoveWords.includes(word));
      shortWords = removeDuplicateWords(shortWords);
      const slugShort = toSlug(shortWords.slice(0, 6).join(" "));

      let keywordWords = words.filter(word => !customRemoveWords.includes(word));
      keywordWords = removeDuplicateWords(keywordWords);
      const slugKeyword = toSlug(keywordWords.join(" "));

      let output1 = slugDefault;
      let output2 = slugShort || slugDefault;
      let output3 = slugKeyword || slugDefault;

      if (mode === "short") {
        output1 = slugShort || slugDefault;
        output2 = slugDefault;
        output3 = slugKeyword || slugDefault;
      } else if (mode === "keyword") {
        output1 = slugKeyword || slugDefault;
        output2 = slugShort || slugDefault;
        output3 = slugDefault;
      }

      document.getElementById("slug1").textContent = output1 || "-";
      document.getElementById("slug2").textContent = output2 || "-";
      document.getElementById("slug3").textContent = output3 || "-";
      document.getElementById("urlPreview").textContent = "example.com/" + (output1 || "your-slug");
      document.getElementById("result").style.display = "block";

      addToHistory(rawText, output1 || slugDefault);
    }

    function copyText(id, button) {
      const text = document.getElementById(id).textContent;

      if (!text || text === "-") {
        showMessage("error", "There is nothing to copy yet.");
        return;
      }

      navigator.clipboard.writeText(text).then(() => {
        const originalText = button.textContent;
        button.textContent = "Copied!";
        showMessage("success", "Slug copied to clipboard.");

        setTimeout(() => {
          button.textContent = originalText;
        }, 1200);
      }).catch(() => {
        showMessage("error", "Copy failed. Please try again.");
      });
    }

    function clearForm() {
      document.getElementById("text").value = "";
      document.getElementById("mode").value = "default";
      document.getElementById("removeWords").value = "";
      document.getElementById("result").style.display = "none";
      document.getElementById("slug1").textContent = "";
      document.getElementById("slug2").textContent = "";
      document.getElementById("slug3").textContent = "";
      document.getElementById("urlPreview").textContent = "example.com/your-slug";
      document.getElementById("errorMessage").style.display = "none";
      document.getElementById("successMessage").style.display = "none";
      document.getElementById("errorMessage").textContent = "";
      document.getElementById("successMessage").textContent = "";
    }
  </script>
</body>
</html>
