<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Case Converter</title>
<meta name="description" content="Convert text to uppercase, lowercase, title case, or sentence case instantly.">
<style>
*{box-sizing:border-box}
body{
font-family:Arial,sans-serif;
max-width:900px;
margin:0 auto;
padding:24px;
background:#f7f7f7;
color:#222
}
.box{
background:#fff;
padding:24px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08)
}
h1{margin-top:0;font-size:32px}
p{color:#444}
textarea{
width:100%;
min-height:180px;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
resize:vertical
}
.buttons{
margin-top:16px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px
}
button{
padding:12px;
font-size:16px;
background:#111;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer
}
button:hover{background:#333}
.result{
margin-top:24px;
background:#f1f5f9;
border:1px solid #dbe2ea;
border-radius:8px;
padding:16px;
word-break:break-word
}
.copy-btn{
margin-top:12px;
background:#2563eb
}
.copy-btn:hover{background:#1d4ed8}
a{
color:#2563eb;
text-decoration:none
}
a:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="box">

<p><a href="../">⬅ Back to tools</a></p>

<h1>Text Case Converter</h1>
<p>Convert text to uppercase, lowercase, title case, or sentence case.</p>

<textarea id="text" placeholder="Paste or type your text here..."></textarea>

<div class="buttons">
<button onclick="toUpper()">UPPERCASE</button>
<button onclick="toLower()">lowercase</button>
<button onclick="toTitle()">Title Case</button>
<button onclick="toSentence()">Sentence case</button>
</div>

<div class="result" id="result"></div>
<button class="copy-btn" onclick="copyText()">Copy Result</button>

</div>

<script>

function getText(){
return document.getElementById("text").value
}

function setResult(text){
document.getElementById("result").textContent=text
}

function toUpper(){
setResult(getText().toUpperCase())
}

function toLower(){
setResult(getText().toLowerCase())
}

function toTitle(){
let text=getText().toLowerCase()
let result=text.replace(/\b\w/g,function(char){
return char.toUpperCase()
})
setResult(result)
}

function toSentence(){
let text=getText().toLowerCase()
let result=text.replace(/(^\s*\w|[.!?]\s*\w)/g,function(c){
return c.toUpperCase()
})
setResult(result)
}

function copyText(){
let text=document.getElementById("result").textContent
if(!text){
alert("No result to copy")
return
}
navigator.clipboard.writeText(text).then(()=>{alert("Copied")})
}

</script>

</body>
</html>
